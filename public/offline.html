<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>You're Offline — Kemedar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 24px;
      padding: 40px 24px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .logo {
      width: 60px;
      height: 60px;
      margin: 0 auto 24px;
      background: #FF6B00;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .icon {
      font-size: 64px;
      margin: 20px 0;
      opacity: 0.6;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1f2937;
      margin: 20px 0 12px;
    }

    .subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .cached-notice {
      background: #dbeafe;
      border: 1px solid #bfdbfe;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #1e40af;
      line-height: 1.6;
    }

    .cached-notice strong {
      display: block;
      margin-bottom: 4px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: #FF6B00;
      color: white;
    }

    .btn-primary:active {
      background: #E55A00;
      transform: scale(0.98);
    }

    .btn-secondary {
      background: transparent;
      color: #FF6B00;
      border: 2px solid #FF6B00;
    }

    .btn-secondary:active {
      background: #fff7ed;
    }

    .timestamp {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #e5e7eb;
      font-size: 12px;
      color: #9ca3af;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @media (max-width: 480px) {
      .container {
        padding: 32px 20px;
      }

      h1 {
        font-size: 20px;
      }

      .icon {
        font-size: 56px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">📶</div>
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p class="subtitle">Check your internet connection and try again.</p>

    <div class="cached-notice">
      <strong>✋ Heads up!</strong>
      You can still browse properties and content you've previously viewed while offline.
    </div>

    <div class="buttons">
      <button class="btn-primary" onclick="tryAgain()">Try Again</button>
      <button class="btn-secondary" onclick="viewCached()">View Cached Content</button>
    </div>

    <div class="timestamp">
      <span class="status-dot"></span>
      <span id="lastSync">Last synced: Just now</span>
    </div>
  </div>

  <script>
    // Update last sync time
    const lastSync = localStorage.getItem('lastSync') || new Date().toISOString();
    const syncDate = new Date(lastSync);
    const now = new Date();
    const diffMinutes = Math.floor((now - syncDate) / 60000);

    let timeStr = 'Just now';
    if (diffMinutes > 60) {
      timeStr = `${Math.floor(diffMinutes / 60)}h ago`;
    } else if (diffMinutes > 0) {
      timeStr = `${diffMinutes}m ago`;
    }
    document.getElementById('lastSync').textContent = `Last synced: ${timeStr}`;

    function tryAgain() {
      window.location.reload();
    }

    function viewCached() {
      // Try to navigate to the home page (should be cached)
      window.location.href = '/';
    }

    // Update sync time on every app load
    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
      localStorage.setItem('lastSync', new Date().toISOString());
    }
  </script>
</body>
</html>
